<div class="modal-header">
  <h5 class="modal-title">Certificado / Aptitud</h5>
  <button class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">

  {% if certificado %}

  <div class="mb-2">
    <b>Aptitud:</b>
    <span class="badge bg-success">{{ certificado.get_aptitud_medica_display }}</span>
  </div>

  <div class="mb-2">
    <b>Fecha:</b> {{ certificado.fecha_emision }}
  </div>

  <div class="mb-2">
    <b>Observaciones:</b><br>
    {{ certificado.detalle_observaciones }}
  </div>

  <div class="mb-2">
    <b>Recomendaciones:</b><br>
    {{ certificado.recomendaciones }}
  </div>

  {% else %}
    <div class="alert alert-warning">
      No existe certificado registrado.
    </div>
  {% endif %}

</div>

<div class="modal-footer">
  <button class="btn btn-light" data-bs-dismiss="modal">Cerrar</button>
</div>
