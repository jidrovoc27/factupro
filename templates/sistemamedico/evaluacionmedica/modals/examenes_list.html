<div class="modal-header">
  <h5 class="modal-title">Exámenes</h5>
  <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">
  <div class="mb-2">
    <div class="fw-semibold">{{ evaluacion.trabajador.persona.razon_social }}</div>
    <small class="text-muted">Fecha: {{ evaluacion.fecha_atencion|date:"Y-m-d" }}</small>
  </div>

  <div class="table-responsive">
    <table class="table table-sm table-bordered align-middle">
      <thead class="table-light">
        <tr>
          <th>Examen</th>
          <th>Fecha</th>
          <th>Resultados</th>
          <th>Obs.</th>
        </tr>
      </thead>
      <tbody>
      {% for x in examenes %}
        <tr>
          <td style="min-width:200px;">{{ x.nombre_examen }}</td>
          <td style="width:110px;">{{ x.fecha|date:"Y-m-d" }}</td>
          <td style="min-width:260px;">{{ x.resultados }}</td>
          <td style="min-width:260px;">{{ x.observaciones }}</td>
        </tr>
      {% empty %}
        <tr><td colspan="4">Sin registros</td></tr>
      {% endfor %}
      </tbody>
    </table>
  </div>
</div>

<div class="modal-footer">
  <button class="btn btn-light" data-bs-dismiss="modal">
    <i class="fa fa-times"></i> Cerrar
  </button>
</div>
