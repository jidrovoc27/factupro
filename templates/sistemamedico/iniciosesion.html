{% load static %}
<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Iniciar sesión</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
    <script type='text/javascript' src="/static/js/jquery.min.js?1.0.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="/static/basescript.js"></script>
    <script>
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        const csrftoken = getCookie('csrftoken');

        $.ajaxSetup({
            beforeSend: function (xhr, settings) {
                const safeMethod = /^(GET|HEAD|OPTIONS|TRACE)$/i.test(settings.type);
                if (!safeMethod && !this.crossDomain) {
                    xhr.setRequestHeader("X-CSRFToken", csrftoken);
                }
            }
        });
    </script>
    <script>
        $(function () {
            clienteinfo = function (window) {
                {
                    var unknown = '-';

                    // screen
                    var screenSize = '';
                    if (screen.width) {
                        width = (screen.width) ? screen.width : '';
                        height = (screen.height) ? screen.height : '';
                        screenSize += '' + width + " x " + height;
                    }

                    // browser
                    var nVer = navigator.appVersion;
                    var nAgt = navigator.userAgent;
                    var browser = navigator.appName;
                    var version = '' + parseFloat(navigator.appVersion);
                    var majorVersion = parseInt(navigator.appVersion, 10);
                    var nameOffset, verOffset, ix;

                    // Opera
                    if ((verOffset = nAgt.indexOf('Opera')) != -1) {
                        browser = 'Opera';
                        version = nAgt.substring(verOffset + 6);
                        if ((verOffset = nAgt.indexOf('Version')) != -1) {
                            version = nAgt.substring(verOffset + 8);
                        }
                    }
                    // Opera Next
                    if ((verOffset = nAgt.indexOf('OPR')) != -1) {
                        browser = 'Opera';
                        version = nAgt.substring(verOffset + 4);
                    }
                    // MSIE
                    else if ((verOffset = nAgt.indexOf('MSIE')) != -1) {
                        browser = 'Microsoft Internet Explorer';
                        version = nAgt.substring(verOffset + 5);
                    }
                    // Chrome
                    else if ((verOffset = nAgt.indexOf('Chrome')) != -1) {
                        browser = 'Chrome';
                        version = nAgt.substring(verOffset + 7);
                    }
                    // Safari
                    else if ((verOffset = nAgt.indexOf('Safari')) != -1) {
                        browser = 'Safari';
                        version = nAgt.substring(verOffset + 7);
                        if ((verOffset = nAgt.indexOf('Version')) != -1) {
                            version = nAgt.substring(verOffset + 8);
                        }
                    }
                    // Firefox
                    else if ((verOffset = nAgt.indexOf('Firefox')) != -1) {
                        browser = 'Firefox';
                        version = nAgt.substring(verOffset + 8);
                    }
                    // MSIE 11+
                    else if (nAgt.indexOf('Trident/') != -1) {
                        browser = 'Microsoft Internet Explorer';
                        version = nAgt.substring(nAgt.indexOf('rv:') + 3);
                    }
                    // Other browsers
                    else if ((nameOffset = nAgt.lastIndexOf(' ') + 1) < (verOffset = nAgt.lastIndexOf('/'))) {
                        browser = nAgt.substring(nameOffset, verOffset);
                        version = nAgt.substring(verOffset + 1);
                        if (browser.toLowerCase() == browser.toUpperCase()) {
                            browser = navigator.appName;
                        }
                    }
                    // trim the version string
                    if ((ix = version.indexOf(';')) != -1) version = version.substring(0, ix);
                    if ((ix = version.indexOf(' ')) != -1) version = version.substring(0, ix);
                    if ((ix = version.indexOf(')')) != -1) version = version.substring(0, ix);

                    majorVersion = parseInt('' + version, 10);
                    if (isNaN(majorVersion)) {
                        version = '' + parseFloat(navigator.appVersion);
                        majorVersion = parseInt(navigator.appVersion, 10);
                    }

                    // mobile version
                    var mobile = /Mobile|mini|Fennec|Android|iP(ad|od|hone)/.test(nVer);

                    // cookie
                    var cookieEnabled = (navigator.cookieEnabled) ? true : false;

                    if (typeof navigator.cookieEnabled == 'undefined' && !cookieEnabled) {
                        document.cookie = 'testcookie';
                        cookieEnabled = (document.cookie.indexOf('testcookie') != -1) ? true : false;
                    }

                    // system
                    var os = unknown;
                    var clientStrings = [
                        {s: 'Windows 10', r: /(Windows 10.0|Windows NT 10.0)/},
                        {s: 'Windows 8.1', r: /(Windows 8.1|Windows NT 6.3)/},
                        {s: 'Windows 8', r: /(Windows 8|Windows NT 6.2)/},
                        {s: 'Windows 7', r: /(Windows 7|Windows NT 6.1)/},
                        {s: 'Windows Vista', r: /Windows NT 6.0/},
                        {s: 'Windows Server 2003', r: /Windows NT 5.2/},
                        {s: 'Windows XP', r: /(Windows NT 5.1|Windows XP)/},
                        {s: 'Windows 2000', r: /(Windows NT 5.0|Windows 2000)/},
                        {s: 'Windows ME', r: /(Win 9x 4.90|Windows ME)/},
                        {s: 'Windows 98', r: /(Windows 98|Win98)/},
                        {s: 'Windows 95', r: /(Windows 95|Win95|Windows_95)/},
                        {s: 'Windows NT 4.0', r: /(Windows NT 4.0|WinNT4.0|WinNT|Windows NT)/},
                        {s: 'Windows CE', r: /Windows CE/},
                        {s: 'Windows 3.11', r: /Win16/},
                        {s: 'Android', r: /Android/},
                        {s: 'Open BSD', r: /OpenBSD/},
                        {s: 'Sun OS', r: /SunOS/},
                        {s: 'Linux', r: /(Linux|X11)/},
                        {s: 'iOS', r: /(iPhone|iPad|iPod)/},
                        {s: 'Mac OS X', r: /Mac OS X/},
                        {s: 'Mac OS', r: /(MacPPC|MacIntel|Mac_PowerPC|Macintosh)/},
                        {s: 'QNX', r: /QNX/},
                        {s: 'UNIX', r: /UNIX/},
                        {s: 'BeOS', r: /BeOS/},
                        {s: 'OS/2', r: /OS\/2/},
                        {
                            s: 'Search Bot',
                            r: /(nuhk|Googlebot|Yammybot|Openbot|Slurp|MSNBot|Ask Jeeves\/Teoma|ia_archiver)/
                        }
                    ];
                    for (var id in clientStrings) {
                        var cs = clientStrings[id];
                        if (cs.r.test(nAgt)) {
                            os = cs.s;
                            break;
                        }
                    }

                    var osVersion = unknown;

                    if (/Windows/.test(os)) {
                        osVersion = /Windows (.*)/.exec(os)[1];
                        os = 'Windows';
                    }

                    switch (os) {
                        case 'Mac OS X':
                            osVersion = /Mac OS X (10[\.\_\d]+)/.exec(nAgt)[1];
                            break;

                        case 'Android':
                            osVersion = /Android ([\.\_\d]+)/.exec(nAgt)[1];
                            break;

                        case 'iOS':
                            osVersion = /OS (\d+)_(\d+)_?(\d+)?/.exec(nVer);
                            osVersion = osVersion[1] + '.' + osVersion[2] + '.' + (osVersion[3] | 0);
                            break;
                    }

                    // flash (you'll need to include swfobject)
                    /* script src="//ajax.googleapis.com/ajax/libs/swfobject/2.2/swfobject.js" */
                    var flashVersion = 'no check';
                    if (typeof swfobject != 'undefined') {
                        var fv = swfobject.getFlashPlayerVersion();
                        if (fv.major > 0) {
                            flashVersion = fv.major + '.' + fv.minor + ' r' + fv.release;
                        } else {
                            flashVersion = unknown;
                        }
                    }
                }

                window.jscd = {
                    screen: screenSize,
                    browser: browser,
                    browserVersion: version,
                    browserMajorVersion: majorVersion,
                    mobile: mobile,
                    os: os,
                    osVersion: osVersion,
                    cookies: cookieEnabled,
                    flashVersion: flashVersion
                };
            };

            clienteinfo(window);

            var navegador = jscd.browser + ' ' + jscd.browserMajorVersion;
            var os = jscd.os + ' ' + jscd.osVersion;
            var cookies = jscd.cookies;
            var screensize = jscd.screen;

            $("#login").click(function () {
                login();
            });


            login = function () {
                var usuario = $("#id_username").val();
                if (usuario.length === 0) {
                    $("#id_username").focus();
                    return false;
                }
                var clave = $("#id_password").val();
                if (clave.length === 0) {
                    $("#id_password").focus();
                    return false;
                }
                var captcha = '';
                var capippriva = '';
                $("#login").attr({"disabled": "disabled"});
                $.ajax({
                    type: "POST",
                    url: "/sistemamedico",
                    data: {
                        'action': 'ingresar',
                        'username': usuario,
                        'pass': clave,
                        {% if system %}
                            'system': '{{ system }}',
                        {% endif %}
                    },
                    success: function (data) {
                        if (data.result === true) {
                            {#window.close()#}
                            {#localStorage.clear();#}
                            {#localStorage.setItem('sessionid', data.sessionid);#}
                            {#window.name = data.sessionid;#}
                            {#location.href = "/loginsga";#}
                            location.href = data.url;
                        } else {
                            $("#login").removeAttr('disabled');
                            {#$("#errormensaje").html(data.mensaje).show();#}
                            alertaToast(data.error);
                        }
                    },
                    error: function () {
                        $("#login").removeAttr('disabled');
                        alertaToast(data.error);
                        {#$("#errormensaje").html('Error al enviar los datos').show();#}
                    },
                    dataType: "json"
                });
            };
        })
    </script>
</head>

<body>
<div class="login-wrapper">

    <div class="login-card">
        <div class="login-head">
            <div class="login-icon">
                <i class="fa-solid fa-user-doctor"></i>
            </div>
            <div>
                <h3>Iniciar sesión</h3>
                <p>Ingrese sus credenciales</p>
            </div>
        </div>

        <form>
            {% csrf_token %}

            <label class="lbl" for="id_username">Usuario</label>
            <div class="field">
                <i class="fa-regular fa-user"></i>
                <input id="id_username" name="username" type="text" autocomplete="username" required
                       placeholder="Usuario">
            </div>

            <label class="lbl" for="id_password">Contraseña</label>
            <div class="field">
                <i class="fa-solid fa-lock"></i>
                <input id="id_password" name="pass" type="password" autocomplete="current-password" required
                       placeholder="••••••••">
            </div>

            <a id="login" class="btn-login" style="cursor: pointer;width: 40%; border-radius: 3.2rem;">Acceder</a>

            <div class="login-footer">
                <span><i class="fa-solid fa-shield-heart"></i> Protección de datos</span>
                <span class="dot">•</span>
                <span>Acceso controlado</span>
            </div>
        </form>
    </div>

</div>


<style>
    :root {
        --bg: #070B14;
        --panel: #0B1530;
        --panel2: #0B1B3F;
        --text: #EAF0FF;
        --muted: rgba(234, 240, 255, .72);
        --muted2: rgba(234, 240, 255, .55);
        --line: rgba(255, 255, 255, .10);
        --chip: rgba(255, 255, 255, .08);
        --chip2: rgba(255, 255, 255, .06);
        --shadow: 0 24px 60px rgba(0, 0, 0, .45);
        --radius: 18px;
    }

    * {
        box-sizing: border-box
    }

    body {
        margin: 0;
        background: radial-gradient(1200px 800px at 20% 10%, #122B62 0%, rgba(18, 43, 98, 0) 60%),
        radial-gradient(1000px 700px at 80% 30%, #0B3A6B 0%, rgba(11, 58, 107, 0) 55%),
        var(--bg);
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
    }

    .login-shell {
        min-height: 100vh;
        display: grid;
        grid-template-columns: 1.05fr 1fr;
    }

    /* LEFT */
    .left {
        padding: 28px;
        display: flex;
        flex-direction: column;
        gap: 18px;
    }

    .brandbar {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px 16px;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: rgba(255, 255, 255, .04);
        backdrop-filter: blur(10px);
    }

    .brandlogo {
        width: 44px;
        height: 44px;
        border-radius: 14px;
        display: grid;
        place-items: center;
        background: rgba(255, 255, 255, .08);
        border: 1px solid rgba(255, 255, 255, .10);
    }

    .brandlogo i {
        font-size: 18px;
        opacity: .95
    }

    .brandname b {
        display: block;
        font-size: 16px;
        letter-spacing: .2px
    }

    .brandname small {
        display: block;
        color: var(--muted2);
        margin-top: 2px
    }

    .hero-saas {
        flex: 1;
        display: flex;
    }

    .hero-glass {
        flex: 1;
        padding: 24px 22px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: linear-gradient(180deg, rgba(255, 255, 255, .06), rgba(255, 255, 255, .03));
        backdrop-filter: blur(14px);
        box-shadow: var(--shadow);
        display: flex;
        flex-direction: column;
        gap: 16px;
    }

    .hero-top {
        display: flex;
        flex-direction: column;
        gap: 12px
    }

    .hero-badge {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 12px 14px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, .10);
        background: rgba(255, 255, 255, .05);
        color: var(--muted);
        width: fit-content;
    }

    .dotx {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: #4DB4FF;
        box-shadow: 0 0 0 6px rgba(77, 180, 255, .12);
    }

    .hero-chips {
        display: flex;
        gap: 10px;
        flex-wrap: wrap
    }

    .chip {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
        border-radius: 999px;
        background: var(--chip);
        border: 1px solid rgba(255, 255, 255, .10);
        color: var(--muted);
        font-size: 13px;
    }

    .chip i {
        opacity: .9
    }

    .hero-title {
        margin: 6px 0 0;
        font-size: 44px;
        letter-spacing: .2px;
        line-height: 1.08;
    }

    .hero-text {
        margin: 0;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.7;
        max-width: 520px;
    }

    .hero-foot {
        margin-top: auto;
        padding-top: 10px;
    }

    .foot-note {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 999px;
        background: rgba(0, 0, 0, .18);
        border: 1px solid rgba(255, 255, 255, .10);
        color: var(--muted);
        font-size: 13px;
    }

    /* RIGHT */
    .right {
        position: relative;
        display: grid;
        place-items: center;
        padding: 28px;
        overflow: hidden;
    }

    .right-bg {
        position: absolute;
        inset: 0;
        background: radial-gradient(900px 520px at 60% 20%, rgba(255, 255, 255, .18) 0%, rgba(255, 255, 255, 0) 55%),
        linear-gradient(180deg, rgba(8, 15, 35, .35), rgba(8, 15, 35, .65)),
        url("{% static 'img/login/medical-bg.png' %}");
        background-size: cover;
        background-position: center;
        filter: saturate(1.1);
        transform: scale(1.03);
    }

    .login-card {
        position: relative;
        width: min(440px, 92vw);
        border-radius: 22px;
        border: 1px solid rgba(255, 255, 255, .12);
        background: rgba(10, 18, 40, .72);
        backdrop-filter: blur(14px);
        box-shadow: var(--shadow);
        padding: 22px 22px 18px;
    }

    .login-head {
        display: flex;
        gap: 12px;
        align-items: center;
        margin-bottom: 14px;
    }

    .login-icon {
        width: 46px;
        height: 46px;
        border-radius: 16px;
        display: grid;
        place-items: center;
        background: rgba(255, 255, 255, .08);
        border: 1px solid rgba(255, 255, 255, .12);
    }

    .login-head h3 {
        margin: 0;
        font-size: 18px;
        letter-spacing: .2px;
    }

    .login-head p {
        margin: 4px 0 0;
        color: var(--muted2);
        font-size: 13px;
    }

    .login-form {
        display: flex;
        flex-direction: column;
        gap: 10px
    }

    .lbl {
        font-size: 13px;
        color: var(--muted);
        margin-top: 6px;
    }

    .field {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 12px;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, .12);
        background: rgba(255, 255, 255, .06);
    }

    .field i {
        color: rgba(255, 255, 255, .75)
    }

    .field input {
        flex: 1;
        border: none;
        outline: none;
        background: transparent;
        color: var(--text);
        font-size: 14px;
    }

    .field input::placeholder {
        color: rgba(234, 240, 255, .45)
    }

    .btn-login {
        margin-top: 12px;
        padding: 12px 14px;
        border: none;
        border-radius: 14px;
        cursor: pointer;
        color: #07101E;
        font-weight: 700;
        letter-spacing: .2px;
        background: linear-gradient(90deg, #4DB4FF, #6BE4FF);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        transition: transform .08s ease, filter .2s ease;
    }

    .btn-login:hover {
        filter: brightness(1.03)
    }

    .btn-login:active {
        transform: translateY(1px)
    }

    .login-footer {
        margin-top: 12px;
        padding-top: 12px;
        border-top: 1px solid rgba(255, 255, 255, .10);
        display: flex;
        gap: 10px;
        justify-content: center;
        color: var(--muted2);
        font-size: 12.5px;
        flex-wrap: wrap;
    }

    .login-footer .dot {
        opacity: .45
    }

    /* Responsive */
    @media (max-width: 980px) {
        .login-shell {
            grid-template-columns: 1fr;
        }

        .left {
            min-height: 48vh;
        }

        .hero-title {
            font-size: 36px;
        }

        .right {
            min-height: 52vh;
        }
    }

    /* Contenedor principal */
    .login-wrapper {
        min-height: 100vh;
        width: 100%;
        display: flex;
        align-items: center; /* Centra vertical */
        justify-content: center; /* Centra horizontal */
        background: linear-gradient(135deg, #0b1530, #060c1a);
    }

    /* Tarjeta */
    .login-card {
        width: 100%;
        max-width: 420px; /* Tamaño ideal */
        background: rgba(10, 18, 40, .75);
        backdrop-filter: blur(12px);
        border-radius: 20px;
        padding: 26px 24px;
        border: 1px solid rgba(255, 255, 255, .12);
        box-shadow: 0 20px 50px rgba(0, 0, 0, .45);
    }

</style>

</body>
</html>
