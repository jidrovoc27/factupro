<div class="{{ col|default:'col-12 col-md-6' }}">
    <label for="{{ field.id_for_label }}" class="form-label fw-semibold mb-1">
        {{ field.label }}
        {% if field.field.required %}<span class="text-danger">*</span>{% endif %}
    </label>

    {% if field.field.widget.attrs.select2search %}
        <select id="id_{{ field.name }}_select2" {% if field.field.widget.attrs.disabled == True %}disabled=""{% endif %}
                style="width: 350px">
            <option value="0" selected="selected">---------</option>
        </select>
        <input name="{{ field.name }}" id="id_{{ field.name }}" value="{{ field.value }}" hidden="hidden"
               {% if field.field.widget.attrs.descripcion %}descripcion="{{ field.field.widget.attrs.descripcion }}"{% endif %}
               class="select2hidden">
    {% elif field.field.widget.input_type == "checkbox" %}
        <div class="form-check">
            {{ field }}
        </div>
    {% else %}
        {{ field }}
    {% endif %}

    {% if field.help_text %}
        <div class="form-text">{{ field.help_text }}</div>
    {% endif %}

    {% if field.errors %}
        <div class="invalid-feedback d-block">
            {{ field.errors }}
        </div>
    {% endif %}

</div>
<style>
    /* === CONTENEDOR === */
.select2-container {
    width: 100% !important;
    font-size: 0.95rem;
}

/* === CAJA PRINCIPAL (como form-control) === */
.select2-container--default .select2-selection--single {
    height: 38px !important;
    padding: 0.375rem 0.75rem;
    border: 1px solid #ced4da;
    border-radius: 0.375rem;
    background-color: #fff;
    display: flex;
    align-items: center;
}

/* === TEXTO SELECCIONADO === */
.select2-container--default .select2-selection__rendered {
    padding-left: 0 !important;
    padding-right: 0 !important;
    line-height: 1.5;
    color: #212529;
    font-weight: 400;
}

/* === FLECHA === */
.select2-container--default .select2-selection__arrow {
    height: 100%;
    right: 8px;
}

/* === BOTÓN LIMPIAR === */
.select2-container--default .select2-selection__clear {
    margin-right: 6px;
    color: #6c757d;
    font-size: 18px;
}

.select2-container--default .select2-selection__clear:hover {
    color: #dc3545;
}

/* === FOCUS (idéntico a Bootstrap) === */
.select2-container--default.select2-container--focus
.select2-selection--single {
    border-color: #86b7fe;
    box-shadow: 0 0 0 0.25rem rgba(13,110,253,.25);
}

/* === DROPDOWN === */
.select2-dropdown {
    border: 1px solid #ced4da;
    border-radius: 0.375rem;
}

/* === INPUT DE BÚSQUEDA === */
.select2-search__field {
    height: 38px;
    padding: 0.375rem 0.75rem;
    border-radius: 0.375rem;
    border: 1px solid #ced4da;
}

/* === OPCIONES === */
.select2-results__option {
    padding: 8px 12px;
    font-size: 0.9rem;
}

/* === OPCIÓN ACTIVA === */
.select2-container--default
.select2-results__option--highlighted {
    background-color: #0d6efd;
    color: #fff;
}

/* === DISABLED === */
.select2-container--default
.select2-selection--single[aria-disabled="true"] {
    background-color: #e9ecef;
    cursor: not-allowed;
}

</style>
